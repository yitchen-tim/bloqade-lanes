name: Publish Python distribution to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build wheels only — skip publish and release"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build wheel (${{ matrix.target }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build the CLI crate and stage C lib artifacts before maturin
      # runs, so they get included in the wheel via data = "dist-data".
      - name: Build CLI + C library
        if: ${{ !startsWith(matrix.target, 'aarch64-unknown-linux') }}
        run: just build-cli stage-clib

      # For Linux aarch64 cross-compilation, the CLI crate must be
      # cross-compiled separately since maturin-action handles PyO3
      # in a container but stage-clib runs on the host.
      - name: Install aarch64 cross-compilation toolchain
        if: ${{ startsWith(matrix.target, 'aarch64-unknown-linux') }}
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI + C library (Linux aarch64 cross)
        if: ${{ startsWith(matrix.target, 'aarch64-unknown-linux') }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release -p bloqade-lanes-bytecode-cli --target aarch64-unknown-linux-gnu
          just stage-clib target/aarch64-unknown-linux-gnu/release

      # Temporarily add data directive so maturin includes dist-data/ in the wheel.
      - name: Patch pyproject.toml for bundled artifacts
        run: uv run python scripts/patch_pyproject_data.py patch

      # manylinux_2_28 targets glibc 2.28+ (AlmaLinux 8 / Ubuntu 20.04+).
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: "2_28"

      - name: Restore pyproject.toml
        run: uv run python scripts/patch_pyproject_data.py restore

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # Build source distribution (platform-independent)
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ startsWith(github.ref, 'refs/tags/') && !inputs.dry_run }}
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bloqade-lanes
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Sign and create GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/') && !inputs.dry_run }}
    needs: [publish-to-pypi]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes ""

      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload
          '${{ github.ref_name }}' dist/**
          --repo '${{ github.repository }}'
